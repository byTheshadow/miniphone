<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MiniPhone</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/forum.css">
</head>
<body>
    <div id="phone-container">
        <!-- 状态栏 -->
        <div id="status-bar">
            <span id="status-time"></span>
            <div class="status-icons">
                <span>⛧</span>
                <span id="status-signal">☽</span>
            </div>
        </div>

        <!-- 页面容器 -->
        <div id="pages">
            <!-- 主页 -->
            <div class="page active" id="page-home">
                <div class="home-header">
                    <h1 class="home-title">☽ MiniPhone ⛧</h1>
                    <p class="home-subtitle">— Whispers in the Dark —</p>
                </div>
                <div class="home-grid">
                    <div class="home-app" data-page="chat-list">
                        <div class="app-icon">💀</div>
                        <span>Messages</span>
                    </div>
                    <div class="home-app" data-page="forum-list">
                        <div class="app-icon">⛧</div>
                        <span>Forum</span>
                    </div>
                    <div class="home-app" data-page="settings">
                        <div class="app-icon">⚙️</div>
                        <span>Settings</span>
                    </div>
                </div>
                <div class="home-clock" id="home-clock"></div>
            </div>

            <!-- 聊天列表 -->
            <div class="page" id="page-chat-list">
                <div class="page-header">
                    <button class="back-btn" data-back="home">◁</button>
                    <h2>Messages</h2>
                    <button class="action-btn" id="btn-new-chat">✦</button>
                </div>
                <div class="page-body">
                    <div id="chat-contacts" class="contact-list"></div>
                </div>
            </div>

            <!-- 聊天页面 -->
            <div class="page" id="page-chat">
                <div class="page-header">
                    <button class="back-btn" data-back="chat-list">◁</button>
                    <div class="chat-header-info">
                        <div class="chat-header-avatar" id="chat-avatar">🤖</div>
                        <h2 id="chat-title">Chat</h2>
                    </div>
                    <button class="action-btn" id="btn-chat-menu">⋮</button>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-bar">
                    <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
                    <button id="btn-send" class="send-btn">➤</button>
                    <button id="btn-extra" class="action-btn" style="flex-shrink:0">＋</button>
                </div>
            </div>

            <!-- 论坛列表 -->
            <div class="page" id="page-forum-list">
                <div class="page-header">
                    <button class="back-btn" data-back="home">◁</button>
                    <h2>Forum</h2>
                    <button class="action-btn" id="btn-new-post">✦</button>
                </div>
                <div class="page-body">
                    <div id="forum-posts" class="post-list"></div>
                </div>
            </div>

            <!-- 帖子详情 -->
            <div class="page" id="page-forum-post">
                <div class="page-header">
                    <button class="back-btn" data-back="forum-list">◁</button>
                    <h2>Post</h2>
                    <button class="action-btn" id="btn-post-menu">⋮</button>
                </div>
                <div class="page-body" id="post-detail"></div>
                <div class="chat-input-bar">
                    <textarea id="comment-input" placeholder="Write a comment..." rows="1"></textarea>
                    <button id="btn-comment" class="send-btn">➤</button>
                </div>
            </div>

            <!-- 设置 -->
            <div class="page" id="page-settings">
                <div class="page-header">
                    <button class="back-btn" data-back="home">◁</button>
                    <h2>Settings</h2>
                </div>
                <div class="page-body settings-body">
                    <div class="settings-section">
                        <h3>⛧ API Configuration</h3>
                        <div class="setting-item">
                            <label>API Base URL</label>
                            <input type="text" id="setting-api-url" placeholder="https://api.example.com">
                        </div>
                        <div class="setting-item">
                            <label>API Key</label>
                            <input type="password" id="setting-api-key" placeholder="sk-...">
                        </div><div class="setting-item">
                            <label>Model</label>
                            <div class="model-select-wrap">
                                <select id="setting-model"><option value="">-- Fetch models first --</option></select>
                <button id="btn-fetch-models" class="small-btn">Fetch</button>
                            </div>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h3>☽ User Profile</h3>
                        <div class="setting-item">
                            <label>Username</label>
                            <input type="text" id="setting-username" placeholder="Your name">
                        </div>
                        <div class="setting-item">
                            <label>Avatar (emoji or URL)</label>
                            <input type="text" id="setting-user-avatar" placeholder="😈or https://...">
                        </div>
                        <div class="setting-item">
                            <label>Persona / System Prompt</label>
                            <textarea id="setting-persona" rows="4" placeholder="Describe yourself..."></textarea>
                        </div>
                    </div><div class="settings-section">
                        <h3>🗡️ Summary Prompt</h3>
                        <div class="setting-item">
                            <textarea id="setting-summary-prompt" rows="5"></textarea>
                        </div>
                        <div class="settings-section">
    <h3>📚 Knowledge Books</h3>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">
        Global books inject into all chats. Char books inject only for that character.
    </p>
    <button id="btn-manage-kb" class="gothic-btn full-width">Manage Knowledge Books</button>
</div>
                    </div>
                <div class="settings-section">
                        <h3>📥 Import / Export</h3>
                        <div class="setting-item btn-group">
                            <button id="btn-import-char" class="gothic-btn">Import Char JSON</button>
                            <button id="btn-export-data" class="gothic-btn">Export All Data</button>
                            <button id="btn-import-data" class="gothic-btn">Import Data</button>
                            <input type="file" id="file-import-char" accept=".json" hidden>
                            <input type="file" id="file-import-data" accept=".json" hidden>
                        </div>
                    </div>
                <button id="btn-save-settings" class="gothic-btn primary full-width">Save Settings</button>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div id="nav-bar">
            <button class="nav-item active" data-page="home">
                <span class="nav-icon">☽</span>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-item" data-page="chat-list">
                <span class="nav-icon">💀</span>
                <span class="nav-label">Chat</span>
            </button>
            <button class="nav-item" data-page="forum-list">
                <span class="nav-icon">⛧</span>
                <span class="nav-label">Forum</span>
            </button>
            <button class="nav-item" data-page="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </button>
        </div>
    </div>

    <!-- 模态框容器 -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div><script src="js/store.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/forum.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
