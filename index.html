<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>MiniPhone</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <!--========== [BLOCK: 样式引入] ========== -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/home-screen.css">
  <link rel="stylesheet" href="css/status-bar.css">
  <link rel="stylesheet" href="css/widgets.css">
  <!-- ========== [/BLOCK: 样式引入] ========== -->

</head>
<body>

  <!-- ========== [BLOCK: 应用根容器] ========== -->
  <div id="app">

    <!-- ========== [BLOCK: 状态栏] ========== -->
    <div id="status-bar" class="status-bar">
      <div class="status-bar__left">
        <span id="status-time" class="status-bar__time"></span>
      </div>
      <div class="status-bar__center">
        <span id="status-notch" class="status-bar__notch"></span>
      </div>
      <div class="status-bar__right">
        <span class="status-bar__icon" id="status-signal">📶</span>
        <span class="status-bar__icon" id="status-wifi">📡</span>
        <span class="status-bar__icon" id="status-battery">🔋</span>
      </div>
    </div>
    <!-- ========== [/BLOCK: 状态栏] ========== -->

    <!-- ========== [BLOCK: 页面容器] ========== -->
    <div id="page-container" class="page-container">

      <!-- ========== [BLOCK: 主屏幕] ========== -->
      <div id="home-screen" class="page home-screen active">

        <!-- ========== [BLOCK: 小组件区域] ========== -->
        <div id="widget-area" class="widget-area"></div>
        <!-- ========== [/BLOCK: 小组件区域] ========== -->

        <!-- ========== [BLOCK: App 图标网格] ========== -->
        <div id="app-grid" class="app-grid"></div>
        <!-- ========== [/BLOCK: App 图标网格] ========== -->

        <!-- ========== [BLOCK: Dock栏] ========== -->
        <div id="dock" class="dock"></div>
        <!-- ========== [/BLOCK: Dock 栏] ========== --></div>
      <!-- ========== [/BLOCK: 主屏幕] ========== -->

      <!-- ========== [BLOCK: App 页面（动态注入）] ========== -->
      <div id="app-view" class="page app-view"></div>
      <!-- ========== [/BLOCK: App 页面（动态注入）] ========== -->

    </div>
    <!-- ========== [/BLOCK: 页面容器] ========== -->

    <!-- ========== [BLOCK: 全局 Home 指示条] ========== -->
    <div id="home-indicator" class="home-indicator" title="返回主屏幕"></div>
    <!-- ========== [/BLOCK: 全局 Home 指示条] ========== -->

  </div>
  <!-- ========== [/BLOCK: 应用根容器] ========== -->

  <!-- ========== [BLOCK: 全局弹层容器] ========== -->
  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <!-- ========== [/BLOCK: 全局弹层容器] ========== -->

  <!-- ========== [BLOCK: 脚本引入] ========== -->
  <script src="js/core/storage.js"></script>
  <script src="js/core/store.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/ui/toast.js"></script>
  <script src="js/ui/modal.js"></script>
  <script src="js/ui/widget-system.js"></script>
  <script src="js/ui/home-screen.js"></script>
  <script src="js/ui/app-icon.js"></script>
  <script src="js/api/openai-compatible.js"></script>
  <script src="js/api/key-manager.js"></script>
  <script src="js/core/app.js"></script>
  <!-- ========== [/BLOCK: 脚本引入] ========== -->

  <!-- ========== [BLOCK: Service Worker 注册] ========== -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(err) {
        console.warn('[SW] 注册失败:', err);
      });
    }
  </script>
  <!-- ========== [/BLOCK: Service Worker 注册] ========== -->

</body>
</html>
