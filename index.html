<!-- ============================================================
     index.html — MiniPhone 主入口
     职责：加载所有资源、提供手机主屏幕容器骨架
     ============================================================ -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- [HEAD START] 元信息 & 资源引入 -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>MiniPhone</title>
  <link rel="manifest" href="manifest.json" />

  <!-- 全局样式 -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/phone-shell.css" />
  <link rel="stylesheet" href="css/widgets.css" />
  <link rel="stylesheet" href="css/apps.css" />
  <!-- [HEAD END] -->
</head>
<body class="theme-dark">

  <!-- [SCREEN-WRAPPER START] 全屏背景容器 -->
  <div id="screen-wrapper">

    <!-- [WALLPAPER START] 壁纸层 -->
    <div id="wallpaper" class="wallpaper"></div>
    <!-- [WALLPAPER END] -->

    <!-- [PHONE-FRAME START] 手机主屏幕框架 -->
    <div id="phone-frame">

      <!-- [STATUS-BAR START] 状态栏 -->
      <div id="status-bar">
        <span id="status-time">00:00</span>
        <div id="status-icons">
          <span class="status-icon" id="status-signal">●●●</span>
          <span class="status-icon" id="status-wifi">WiFi</span>
          <span class="status-icon" id="status-battery">🔋</span>
        </div>
      </div>
      <!-- [STATUS-BAR END] -->

      <!-- [HOME-SCREEN START] 主屏幕滑动区域 -->
      <div id="home-screen">

        <!-- [PAGE-DOTS START] 页面指示点 -->
        <div id="page-dots"></div>
        <!-- [PAGE-DOTS END] -->

        <!-- [PAGES-CONTAINER START] 所有页面的滑动容器 -->
        <div id="pages-container">
          <!-- 页面由 JS 动态生成 -->
        </div>
        <!-- [PAGES-CONTAINER END] -->

      </div>
      <!-- [HOME-SCREEN END] -->

      <!-- [DOCK START] 底部 Dock 栏 -->
      <div id="dock">
        <div id="dock-glass"></div>
        <div id="dock-icons">
          <!-- Dock 图标由 JS 动态生成 -->
        </div>
      </div>
      <!-- [DOCK END] -->

    </div>
    <!-- [PHONE-FRAME END] -->

    <!-- [APP-LAYER START] App 全屏覆盖层（打开 App 时使用） -->
    <div id="app-layer" class="hidden">
      <div id="app-container">
        <!-- App 内容由 router.js 动态注入 -->
      </div>
      <!-- App 内部状态栏 -->
      <div id="app-status-bar">
        <button id="app-back-btn" aria-label="返回主屏幕">←</button>
        <span id="app-title"></span>
        <div style="width:32px"></div>
      </div>
    </div>
    <!-- [APP-LAYER END] -->

    <!-- [MODAL-ROOT START] 全局弹窗挂载点 -->
    <div id="modal-root"></div>
    <!-- [MODAL-ROOT END] -->

    <!-- [TOAST-ROOT START] 全局 Toast 挂载点 -->
    <div id="toast-root"></div>
    <!-- [TOAST-ROOT END] -->

    <!-- [SETTINGS-PANEL START] 设置面板（从右侧滑入） -->
    <div id="settings-panel" class="panel-hidden" role="dialog" aria-label="设置">
      <!-- 由 settings.js 填充 -->
    </div>
    <!-- [SETTINGS-PANEL END] -->

  </div>
  <!-- [SCREEN-WRAPPER END] -->

  <!-- [SCRIPTS START] JS 模块加载（顺序敏感） -->
  <!-- 核心层 -->
  <script src="js/core/store.js"></script>
  <script src="js/core/storage.js"></script>
  <script src="js/core/router.js"></script>
  <!-- UI 层 -->
  <script src="js/ui/toast.js"></script>
  <script src="js/ui/modal.js"></script>
  <script src="js/ui/phone-shell.js"></script>
  <!-- 小组件层 -->
  <script src="js/widgets/widget-registry.js"></script>
  <script src="js/widgets/clock.js"></script>
  <script src="js/widgets/countdown.js"></script>
  <script src="js/widgets/together-music.js"></script>
  <script src="js/widgets/profile-card.js"></script>
  <script src="js/widgets/mood.js"></script>
  <script src="js/widgets/photo-carousel.js"></script>
  <script src="js/widgets/sticky-note.js"></script>
  <script src="js/widgets/fortune.js"></script>
  <script src="js/widgets/pomodoro.js"></script>
  <script src="js/widgets/steps.js"></script>
  <!-- App 层 -->
  <script src="js/apps/chat/chat.js"></script>
  <script src="js/apps/calendar/calendar.js"></script>
  <script src="js/apps/music/music.js"></script>
  <script src="js/apps/pet/pet.js"></script>
  <script src="js/apps/ledger/ledger.js"></script>
  <script src="js/apps/ticket/ticket.js"></script>
  <script src="js/apps/settings/settings.js"></script>
  <!-- 入口（最后加载） -->
  <script src="js/core/app.js"></script>
  <!-- [SCRIPTS END] -->

</body>
</html>
<!-- ============================================================
     index.html END
     ============================================================ -->
